services:
  web_api:
    container_name: flowsign_api_app
    build: .
    image: flowsign-api:1.0.0
    ports:
      - 8080:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=db;Database=PersonDb;Username=postgres;Password=p@55w0rd
      - Jwt__Secret=your-secret-key-minimum-32-characters
      - Jwt__Issuer=flowsign
      - Jwt__Audience=flowsign-client
      - Jwt__ExpiresInMinutes=60
    depends_on:
      db:
        condition: service_healthy
        restart: true
  db:
    image: postgres:15
    container_name: postgres_db
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: p@55w0rd
      POSTGRES_DB: flowsign
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
volumes:
  postgres_data: